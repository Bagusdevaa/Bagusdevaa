name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: 'username=Bagusdevaa&theme=algolia&show_icons=true&include_all_commits=true'
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: 'username=Bagusdevaa&layout=compact&langs_count=8&card_width=320&theme=algolia&hide=jupyter%20notebook,html'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards  
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README stats cards" || echo "no changes"
          git push
